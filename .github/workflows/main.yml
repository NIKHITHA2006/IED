name: IED CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Backend Build & Test
      run: |
        cd backend
        npm install
        # npm test (Add tests later)

    - name: Frontend Build & Test
      run: |
        cd frontend
        npm install
        npm run build
